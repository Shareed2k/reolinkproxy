services:
  reolinkproxy:
    build: .
    image: reolinkproxy:latest
    container_name: reolinkproxy
    restart: unless-stopped
    # Uncomment the following line if you want WS-Discovery (multicast) to work reliably on your local network
    # network_mode: host
    ports:
      - "8554:8554/tcp" # RTSP
      - "8000:8000/udp" # RTP
      - "8001:8001/udp" # RTCP
      - "8002:8002/tcp" # ONVIF API
      - "3702:3702/udp" # ONVIF WS-Discovery
    environment:
      # Connection settings (Use either HOST or UID)
      - REOLINK_HOST=192.168.1.100
      # - REOLINK_UID=9527000...
      - REOLINK_USERNAME=admin
      - REOLINK_PASSWORD=your_password
      - REOLINK_STREAM=main
      - REOLINK_CHANNEL=0
      
      # Optional: Override the host IP advertised in RTSP and ONVIF URLs (useful if running in docker without host networking)
      # - REOLINK_SERVER_ADVERTISE_HOST=192.168.1.50
      
      # ONVIF authentication credentials (if left blank, ONVIF endpoints will be unauthenticated)
      - REOLINK_ONVIF_USERNAME=admin
      - REOLINK_ONVIF_PASSWORD=onvif_password
      
      # Optional: Override device metadata
      # - DEVICE_NAME=Camera01
      # - DEVICE_MANUFACTURER=Reolink
      # - DEVICE_MODEL=Argus 3 Ultra
